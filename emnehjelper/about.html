<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/about.css">
  <title>NTNU Emnehjelper</title>
</head>

<body>
  <div class="container">
    <h1>Velkommen til Emnehjelper!</h1>
    <p>
      Få øyeblikkelig informasjon om beståttprosent, vanskelighetsgrad og arbeidsmengde for emner ved NTNU.
    </p>
    <div class="buttons-section">
      <a href="https://www.ntnu.edu/studies/courses/TDT4100" class="button" target="_blank">
        <span class="icon">📚</span>
        <span>Se en forbedret emneside</span>
      </a>

      <a href="https://www.ntnu.no/studier/mtdt/studieretninger-og-hovedprofiler#year=2024&programmeCode=MTDT"
        class="button" target="_blank">
        <span class="icon">🗓️</span>
        <span>Utforsk en studieplan</span>
      </a>

      <a href="https://www.ntnu.no/studier/emnesok"
        class="button" target="_blank">
        <span class="icon">🔍</span>
        <span>Søk etter emner</span>
      </a>
    </div>

    <div class="feedback">
      <p class="feedback-title">Liker du Emnehjelper?</p>
      <div class="feedback-buttons">
        <a href="mailto:emnehjelper@gmail.com" class="feedback-btn email">
          <span class="feedback-icon">✉️</span>
          <span>Send tilbakemelding</span>
        </a>
        <a href="https://chromewebstore.google.com/detail/emnehjelper/ocfgbjjagbojipkdhbloaegpigmkgiaf/reviews" class="feedback-btn review" target="_blank">
          <span class="feedback-icon">⭐</span>
          <span>Gi oss en anmeldelse</span>
        </a>
      </div>
    </div>

  </div>
</body>

</html>
